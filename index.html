<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Task Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      width: 350px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .task-input {
      display: flex;
      margin-bottom: 15px;
    }
    .task-input input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px 0 0 8px;
      outline: none;
    }
    .task-input button {
      padding: 10px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
    }
    .filters {
      display: flex;
      justify-content: space-around;
      margin-bottom: 15px;
    }
    .filters button {
      border: none;
      background: #eee;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    .filters button.active {
      background: #4CAF50;
      color: white;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f9f9f9;
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 6px;
    }
    li.completed span {
      text-decoration: line-through;
      color: #888;
    }
    .actions button {
      margin-left: 5px;
      border: none;
      padding: 5px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
    .actions .complete { background: #4CAF50; color: white; }
    .actions .edit { background: #2196F3; color: white; }
    .actions .delete { background: #f44336; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Daily Task Tracker</h1>
    <div class="task-input">
      <input type="text" id="taskInput" placeholder="Enter a new task">
      <button onclick="addTask()">Add</button>
    </div>
    <div class="filters">
      <button onclick="setFilter('all')" class="active">All</button>
      <button onclick="setFilter('active')">Active</button>
      <button onclick="setFilter('completed')">Completed</button>
    </div>
    <ul id="taskList"></ul>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
    let filter = 'all';

    function saveTasks() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function renderTasks() {
      const list = document.getElementById('taskList');
      list.innerHTML = '';
      let filtered = tasks.filter(task => {
        if (filter === 'active') return !task.completed;
        if (filter === 'completed') return task.completed;
        return true;
      });
      filtered.forEach((task, index) => {
        const li = document.createElement('li');
        li.className = task.completed ? 'completed' : '';
        const span = document.createElement('span');
        span.textContent = task.text;
        li.appendChild(span);

        const actions = document.createElement('div');
        actions.className = 'actions';

        const completeBtn = document.createElement('button');
        completeBtn.textContent = task.completed ? 'Undo' : 'Complete';
        completeBtn.className = 'complete';
        completeBtn.onclick = () => toggleComplete(index);
        actions.appendChild(completeBtn);

        const editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.className = 'edit';
        editBtn.onclick = () => editTask(index);
        actions.appendChild(editBtn);

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Delete';
        deleteBtn.className = 'delete';
        deleteBtn.onclick = () => deleteTask(index);
        actions.appendChild(deleteBtn);

        li.appendChild(actions);
        list.appendChild(li);
      });
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) {
        alert('Task cannot be empty!');
        return;
      }
      if (tasks.length >= 15) {
        alert('Maximum of 15 tasks allowed!');
        return;
      }
      tasks.push({ text, completed: false });
      input.value = '';
      saveTasks();
      renderTasks();
    }

    function toggleComplete(index) {
      tasks[index].completed = !tasks[index].completed;
      saveTasks();
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    }

    function editTask(index) {
      const newText = prompt('Edit task:', tasks[index].text);
      if (newText !== null) {
        const trimmed = newText.trim();
        if (trimmed) {
          tasks[index].text = trimmed;
          saveTasks();
          renderTasks();
        } else {
          alert('Task cannot be empty!');
        }
      }
    }

    function setFilter(f) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.filters button[onclick="setFilter('${f}')"]`).classList.add('active');
      renderTasks();
    }

    renderTasks();
  </script>
</body>
</html>

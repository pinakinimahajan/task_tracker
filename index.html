<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Task Tracker</h1>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Enter a task..." maxlength="50">
            <button id="addBtn">Add</button>
        </div>
        <p id="taskCount">Tasks: 0 / 15</p>
        <ul id="taskList"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
